services:
  butler:
    build:
      context: .
      dockerfile: docker/butler/Dockerfile
      args:
        CODEX_VERSION: ${CODEX_VERSION:-0.124.0}
        PI_VERSION: ${PI_VERSION:-0.70.2}
        BUTLER_INSTALL_MODE: ${BUTLER_INSTALL_MODE:-production}
    image: manor-butler:local
    container_name: manor-butler
    hostname: manor-butler
    command: ["/usr/local/bin/start-butler"]
    working_dir: /opt/manor/butler
    environment:
      MANOR_ROLE: butler
      MANOR_STATE_DIR: /state
      HOME: /home/butler
      CODEX_HOME: /home/butler/.codex
      CODEX_SHARED_HOME_DIR: /codex-home
      CODEX_SHARED_CONFIG_DIR: /codex-config
      PI_AGENT_DIR: /home/butler/.pi/agent
      MANOR_IMAGE_REFERENCE_DIR: /artifacts/manor-images
      BUTLER_PORT: 8080
      BUTLER_PUBLIC_PORT: ${BUTLER_HOST_PORT:-8180}
      BUTLER_HOT_RELOAD: ${BUTLER_HOT_RELOAD:-0}
      BUTLER_TTYD_PORT: 7682
      BUTLER_TTYD_BASE_PATH: /butler-terminal/
      MANOR_PREVIEW_LEASE_TTL_MS: ${MANOR_PREVIEW_LEASE_TTL_MS:-1800000}
      MANOR_STACK_LEASE_TTL_MS: ${MANOR_STACK_LEASE_TTL_MS:-1800000}
      MANOR_SERVICE_LEASE_TTL_MS: ${MANOR_SERVICE_LEASE_TTL_MS:-1800000}
      MANOR_LEASE_REAP_GRACE_MS: ${MANOR_LEASE_REAP_GRACE_MS:-600000}
      MANOR_LEASE_SWEEP_INTERVAL_MS: ${MANOR_LEASE_SWEEP_INTERVAL_MS:-30000}
      CODEX_BASE_URL: ws://codex-box:8080
      BUTLER_AUTH_BOOTSTRAP: ${BUTLER_AUTH_BOOTSTRAP:-auto}
      BUTLER_FORCED_LOGIN_METHOD: ${BUTLER_FORCED_LOGIN_METHOD:-}
      MANOR_CODEX_AUTO_UPDATE: ${MANOR_CODEX_AUTO_UPDATE:-0}
      MANOR_CODEX_AUTO_UPDATE_VERSION: ${MANOR_CODEX_AUTO_UPDATE_VERSION:-latest}
      MANOR_CODEX_AUTO_UPDATE_REQUIRED: ${MANOR_CODEX_AUTO_UPDATE_REQUIRED:-0}
      MANOR_PI_AUTO_UPDATE: ${MANOR_PI_AUTO_UPDATE:-0}
      MANOR_PI_AUTO_UPDATE_VERSION: ${MANOR_PI_AUTO_UPDATE_VERSION:-latest}
      MANOR_PI_AUTO_UPDATE_REQUIRED: ${MANOR_PI_AUTO_UPDATE_REQUIRED:-0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_KEY_FILE: ${OPENAI_API_KEY_FILE:-}
      HTTP_PROXY: http://egress:3128
      HTTPS_PROXY: http://egress:3128
      ALL_PROXY: http://egress:3128
      NODE_OPTIONS: --use-env-proxy
      http_proxy: http://egress:3128
      https_proxy: http://egress:3128
      all_proxy: http://egress:3128
      NO_PROXY: localhost,127.0.0.1,codex-box,butler,egress,preview-egress,runtime-broker,playwright,desktop-proof
      no_proxy: localhost,127.0.0.1,codex-box,butler,egress,preview-egress,runtime-broker,playwright,desktop-proof
      RUNTIME_BROKER_URL: http://runtime-broker:8090
      RUNTIME_BROKER_TOKEN: ${RUNTIME_BROKER_TOKEN:-manor-local-runtime-broker-token}
    volumes:
      - butler-state:/state
      - butler-home:/home/butler/.codex
      - butler-pi:/home/butler/.pi
      - codex-home:/codex-home
      - codex-config:/codex-config:ro
      - repos:/repos
      - artifacts:/artifacts
    depends_on:
      codex-box:
        condition: service_healthy
      egress:
        condition: service_healthy
      runtime-broker:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--silent", "--fail", "http://127.0.0.1:8080/livez"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - control
      - internet
      - work

  butler-gateway:
    image: nginx:1.27-alpine
    container_name: manor-butler-gateway
    depends_on:
      butler:
        condition: service_started
    volumes:
      - ./docker/butler-gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${BUTLER_HOST_PORT:-8180}:8080"
      - "127.0.0.1:1455:1455"
    networks:
      - control
      - internet

  codex-box:
    build:
      context: .
      dockerfile: docker/codex-box/Dockerfile
      args:
        CODEX_VERSION: ${CODEX_VERSION:-0.124.0}
    image: manor-codex-box:local
    container_name: manor-codex-box
    hostname: manor-codex
    command: ["/usr/local/bin/start-codex-app-server"]
    working_dir: /repos
    environment:
      MANOR_ROLE: codex-box
      MANOR_STATE_DIR: /state
      MANOR_BUTLER_BASE_URL: http://butler:8080
      MANOR_RUNTIME_BROKER_URL: http://runtime-broker:8090
      HOME: /home/codex
      CODEX_HOME: /home/codex/.codex
      CODEX_APP_SERVER_LISTEN: ws://0.0.0.0:8080
      CODEX_PERSONALITY: ${CODEX_PERSONALITY:-pragmatic}
      CODEX_MODEL_INSTRUCTIONS_FILE: ${CODEX_MODEL_INSTRUCTIONS_FILE:-/opt/manor/config/codex-model-instructions.md}
      CODEX_AUTH_BOOTSTRAP: ${CODEX_AUTH_BOOTSTRAP:-auto}
      CODEX_FORCED_LOGIN_METHOD: ${CODEX_FORCED_LOGIN_METHOD:-}
      MANOR_CODEX_AUTO_UPDATE: ${MANOR_CODEX_AUTO_UPDATE:-0}
      MANOR_CODEX_AUTO_UPDATE_VERSION: ${MANOR_CODEX_AUTO_UPDATE_VERSION:-latest}
      MANOR_CODEX_AUTO_UPDATE_REQUIRED: ${MANOR_CODEX_AUTO_UPDATE_REQUIRED:-0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_KEY_FILE: ${OPENAI_API_KEY_FILE:-}
      HTTP_PROXY: http://egress:3128
      HTTPS_PROXY: http://egress:3128
      ALL_PROXY: http://egress:3128
      http_proxy: http://egress:3128
      https_proxy: http://egress:3128
      all_proxy: http://egress:3128
      NO_PROXY: localhost,127.0.0.1,codex-box,butler,egress,preview-egress,runtime-broker,playwright,desktop-proof
      no_proxy: localhost,127.0.0.1,codex-box,butler,egress,preview-egress,runtime-broker,playwright,desktop-proof
    depends_on:
      egress:
        condition: service_healthy
    volumes:
      - codex-state:/state
      - codex-home:/home/codex/.codex
      - codex-config:/home/codex/.config
      - ./config/codex-model-instructions.md:/opt/manor/config/codex-model-instructions.md:ro
      - repos:/repos
      - artifacts:/artifacts
    healthcheck:
      test: ["CMD", "node", "/opt/manor/codex-box/healthcheck.mjs"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - control
      - work

  egress:
    build:
      context: .
      dockerfile: docker/egress/Dockerfile
    image: manor-egress:local
    container_name: manor-egress
    command: ["sh", "-lc", "rm -f /tmp/squid.pid && exec squid -N -f /etc/squid/squid.conf"]
    environment:
      MANOR_ROLE: egress
    volumes:
      - egress-state:/state
    healthcheck:
      test: ["CMD", "sh", "-lc", "nc -z 127.0.0.1 3128"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    networks:
      - work
      - internet

  preview-egress:
    build:
      context: .
      dockerfile: docker/preview-egress/Dockerfile
    image: manor-preview-egress:local
    container_name: manor-preview-egress
    environment:
      MANOR_ROLE: preview-egress
      PREVIEW_EGRESS_PROFILES_FILE: /opt/manor/config/preview-egress-profiles.json
      PREVIEW_EGRESS_ADMIN_PORT: 8091
      PREVIEW_EGRESS_DYNAMIC_PORT_START: 3200
      PREVIEW_EGRESS_DYNAMIC_PORT_END: 3299
    volumes:
      - ./config/preview-egress-profiles.json:/opt/manor/config/preview-egress-profiles.json:ro
      - preview-egress-state:/state
    healthcheck:
      test: ["CMD", "sh", "-lc", "nc -z 127.0.0.1 3128"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    networks:
      - preview
      - internet

  runtime-broker:
    build:
      context: .
      dockerfile: docker/runtime-broker/Dockerfile
    image: manor-runtime-broker:local
    container_name: manor-runtime-broker
    environment:
      MANOR_ROLE: runtime-broker
      RUNTIME_BROKER_PORT: 8090
      RUNTIME_CODEX_ACCESS_FILE: /state/codex-broker-access.json
      RUNTIME_STACK_BINDINGS_FILE: /runtime-state/stack-thread-bindings.json
      RUNTIME_PREVIEW_NETWORK: manor_preview
      RUNTIME_PREVIEW_EGRESS_CONFIG: /opt/manor/config/preview-egress-profiles.json
      RUNTIME_PREVIEW_EGRESS_ADMIN_URL: http://preview-egress:8091
      RUNTIME_PREVIEW_IMAGE: node:22-bookworm
      RUNTIME_PREVIEW_EXPOSE_HOST: ${RUNTIME_PREVIEW_EXPOSE_HOST:-0.0.0.0}
      RUNTIME_PREVIEW_PORT_START: ${RUNTIME_PREVIEW_PORT_START:-43000}
      RUNTIME_PREVIEW_PORT_END: ${RUNTIME_PREVIEW_PORT_END:-43999}
      RUNTIME_PREVIEW_PUBLIC_HOST: ${RUNTIME_PREVIEW_PUBLIC_HOST:-127.0.0.1}
      RUNTIME_PREVIEW_TAILNET_HOST: ${RUNTIME_PREVIEW_TAILNET_HOST:-}
      RUNTIME_SERVICE_SHARED_NETWORK: manor_work
      RUNTIME_ROUTE_BASE: /preview
      RUNTIME_OPERATOR_BASE_URL: http://127.0.0.1:${BUTLER_HOST_PORT:-8180}
      RUNTIME_OPERATOR_BASE_URL_INTERNAL: http://butler:8080
      RUNTIME_PLAYWRIGHT_CONTAINER: manor-playwright
      RUNTIME_DESKTOP_PROOF_CONTAINER: manor-desktop-proof
      RUNTIME_DESKTOP_PROOF_CONTROL_URL: http://desktop-proof:3888
      RUNTIME_BROKER_TOKEN: ${RUNTIME_BROKER_TOKEN:-manor-local-runtime-broker-token}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/preview-egress-profiles.json:/opt/manor/config/preview-egress-profiles.json:ro
      - butler-state:/state:ro
      - runtime-broker-state:/runtime-state
    depends_on:
      preview-egress:
        condition: service_healthy
      codex-box:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8090/health').then((response)=>{if(!response.ok) process.exit(1);}).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - control
      - preview

  playwright:
    build:
      context: .
      dockerfile: docker/playwright/Dockerfile
    image: manor-playwright:local
    container_name: manor-playwright
    environment:
      MANOR_ROLE: playwright
    shm_size: "2gb"
    volumes:
      - playwright-state:/state
    networks:
      - control
      - work
      - internet

  desktop-proof:
    profiles: ["desktop"]
    build:
      context: .
      dockerfile: docker/desktop-proof/Dockerfile
    image: manor-desktop-proof:local
    container_name: manor-desktop-proof
    environment:
      MANOR_ROLE: desktop-proof
      MANOR_DESKTOP_PROOF_PORT: 3888
      MANOR_DESKTOP_PROOF_VNC_PORT: 6080
      MANOR_DESKTOP_PROOF_RFB_PORT: 5900
      MANOR_DESKTOP_PROOF_HOME: /state/home
      DISPLAY: :99
    shm_size: "2gb"
    ports:
      - "127.0.0.1:${DESKTOP_PROOF_NOVNC_PORT:-6080}:6080"
    volumes:
      - desktop-proof-state:/state
      - repos:/repos
    networks:
      - control
      - work
      - internet

networks:
  control:
    internal: true
  work:
    internal: true
  preview:
    internal: true
  internet: {}

volumes:
  artifacts:
  butler-home:
  butler-pi:
  butler-state:
  codex-config:
  codex-home:
  codex-state:
  desktop-proof-state:
  egress-state:
  playwright-state:
  preview-egress-state:
  repos:
  runtime-broker-state:
