http_port 3128
visible_hostname manor-egress

shutdown_lifetime 1 seconds

access_log stdio:/tmp/access.log
cache_log /tmp/cache.log
cache_store_log none
pid_filename /tmp/squid.pid
coredump_dir /tmp

cache deny all

acl CONNECT method CONNECT
acl SSL_ports port 443
acl Safe_ports port 80 443

acl openai_root dstdomain openai.com
acl openai_subdomains dstdomain .openai.com
acl chatgpt_root dstdomain chatgpt.com
acl chatgpt_subdomains dstdomain .chatgpt.com
acl github_root dstdomain github.com
acl github_subdomains dstdomain .github.com
acl github_ai_root dstdomain github.ai
acl github_ai_subdomains dstdomain .github.ai
acl github_app_root dstdomain githubapp.com
acl github_app_subdomains dstdomain .githubapp.com
acl github_assets_root dstdomain githubassets.com
acl github_assets_subdomains dstdomain .githubassets.com
acl github_blog dstdomain github.blog
acl github_content_root dstdomain githubusercontent.com
acl github_content dstdomain .githubusercontent.com
acl github_copilot_root dstdomain githubcopilot.com
acl github_copilot_subdomains dstdomain .githubcopilot.com
acl github_dev_root dstdomain github.dev
acl github_dev_subdomains dstdomain .github.dev
acl github_io_root dstdomain github.io
acl github_io_subdomains dstdomain .github.io
acl github_lfs_storage dstdomain github-cloud.s3.amazonaws.com
acl github_packages_root dstdomain pkg.github.com
acl github_packages_subdomains dstdomain .pkg.github.com
acl github_registry_root dstdomain ghcr.io
acl github_registry_subdomains dstdomain .ghcr.io
acl github_status_root dstdomain githubstatus.com
acl github_status_subdomains dstdomain .githubstatus.com
acl npm_registry dstdomain registry.npmjs.org
acl npm_subdomains dstdomain .npmjs.org

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow openai_root
http_access allow openai_subdomains
http_access allow chatgpt_root
http_access allow chatgpt_subdomains
http_access allow github_root
http_access allow github_subdomains
http_access allow github_ai_root
http_access allow github_ai_subdomains
http_access allow github_app_root
http_access allow github_app_subdomains
http_access allow github_assets_root
http_access allow github_assets_subdomains
http_access allow github_blog
http_access allow github_content_root
http_access allow github_content
http_access allow github_copilot_root
http_access allow github_copilot_subdomains
http_access allow github_dev_root
http_access allow github_dev_subdomains
http_access allow github_io_root
http_access allow github_io_subdomains
http_access allow github_lfs_storage
http_access allow github_packages_root
http_access allow github_packages_subdomains
http_access allow github_registry_root
http_access allow github_registry_subdomains
http_access allow github_status_root
http_access allow github_status_subdomains
http_access allow npm_registry
http_access allow npm_subdomains
http_access deny all
