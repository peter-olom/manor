map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 8080;
  server_name _;
  resolver 127.0.0.11 ipv6=off valid=10s;

  location /terminal/ {
    set $codex_terminal_upstream http://codex-box:7681;
    proxy_pass $codex_terminal_upstream;
    proxy_http_version 1.1;
    proxy_read_timeout 1h;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    add_header X-Accel-Buffering no;
    proxy_buffering off;
  }

  location /butler-terminal/ {
    set $butler_terminal_upstream http://butler:7682;
    proxy_pass $butler_terminal_upstream;
    proxy_http_version 1.1;
    proxy_read_timeout 1h;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    add_header X-Accel-Buffering no;
    proxy_buffering off;
  }

  location / {
    set $butler_upstream http://butler:8080;
    proxy_pass $butler_upstream;
    proxy_http_version 1.1;
    proxy_cache off;
    proxy_read_timeout 1h;
    chunked_transfer_encoding off;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    add_header X-Accel-Buffering no;
    proxy_buffering off;
  }
}

server {
  listen 1455;
  server_name _;
  resolver 127.0.0.11 ipv6=off valid=10s;

  location = /auth/callback {
    set $butler_auth_upstream http://butler:1455;
    proxy_pass $butler_auth_upstream;
    proxy_http_version 1.1;
    proxy_read_timeout 1m;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    return 404;
  }
}
